name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build-mac:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Use desktop package.json
        run: cp package.desktop.json package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets
        run: pnpm build:web
        env:
          ELECTRON_BUILD: '1'
          NODE_ENV: production

      - name: Package macOS app
        run: npx electron-builder --mac --config electron-builder.yml --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          NODE_ENV: production

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg
          retention-days: 30

  build-win:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Use desktop package.json
        shell: pwsh
        run: Copy-Item package.desktop.json package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets
        run: pnpm build:web
        env:
          ELECTRON_BUILD: '1'
          NODE_ENV: production

      - name: Package Windows app
        run: npx electron-builder --win --config electron-builder.yml --publish never
        env:
          NODE_ENV: production

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: release/*.exe
          retention-days: 30

  release:
    name: Create Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: release/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: release/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PartyConsole ${{ github.ref_name }}
          body: |
            ## PartyConsole ${{ github.ref_name }}

            - **macOS**: Download `.dmg`, open and drag app to Applications
            - **Windows**: Download `.exe`, run the installer
          files: |
            release/mac/*.dmg
            release/win/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
