name: Build Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build-mac:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Use desktop package.json
        run: cp package.desktop.json package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets
        run: pnpm build:web
        env:
          ELECTRON_BUILD: '1'
          NODE_ENV: production

      - name: Package macOS app (dmg)
        run: npx electron-builder --mac --config electron-builder.yml --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          NODE_ENV: production

      - name: List release files
        run: ls -lh release/

      - name: Upload macOS DMG (x64)
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-x64
          path: release/*x64*.dmg
          retention-days: 30

      - name: Upload macOS DMG (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-arm64
          path: release/*arm64*.dmg
          retention-days: 30

  build-win:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Use desktop package.json
        shell: pwsh
        run: Copy-Item package.desktop.json package.json

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web assets
        run: pnpm build:web
        env:
          ELECTRON_BUILD: '1'
          NODE_ENV: production

      - name: Package Windows app
        run: npx electron-builder --win --config electron-builder.yml --publish never
        env:
          NODE_ENV: production

      - name: List release files
        shell: pwsh
        run: Get-ChildItem release/ | Format-Table Name, Length

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: win-installer-x64
          path: release/*.exe
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download macOS DMG (x64)
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg-x64
          path: release/mac

      - name: Download macOS DMG (arm64)
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg-arm64
          path: release/mac

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: win-installer-x64
          path: release/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 奇妙奇遇控制台 ${{ github.ref_name }}
          body: |
            ## 奇妙奇遇控制台 ${{ github.ref_name }}

            ### 下载安装

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | macOS (Intel) | `*x64.dmg` | 适用于 Intel Mac |
            | macOS (Apple Silicon) | `*arm64.dmg` | 适用于 M1/M2/M3 Mac |
            | Windows | `*.exe` | Windows 10/11 安装包 |

            ### macOS 安装说明
            1. 下载对应架构的 `.dmg` 文件
            2. 打开 dmg，将应用拖入 Applications 文件夹
            3. 首次打开时若提示“无法验证开发者”，请前往「系统偏好设置 → 安全性与隐私」点击「仍要打开」

            ### Windows 安装说明
            1. 下载 `.exe` 安装包
            2. 运行安装程序，按提示完成安装
          files: |
            release/mac/*.dmg
            release/win/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
