appId: com.partyconsole.app
productName: 奇妙奇遇控制台
copyright: Copyright © 2025 PartyConsole

# App icon - electron-builder auto-selects .icns for mac, .ico for win
icon: electron/icons/icon

directories:
  output: release

# Files to include in the app package
files:
  - dist/public/**
  - electron/main.js
  - electron/package.json
  - electron/icons/**
  - "!node_modules/**"
  - "!client/**"
  - "!server/**"
  - "!shared/**"
  - "!.manus-logs/**"
  - "!patches/**"
  - "!*.md"
  - "!*.json"
  - "electron/package.json"

# Entry point
extraMetadata:
  main: electron/main.js

# macOS
mac:
  category: public.app-category.entertainment
  darkModeSupport: true
  target:
    - target: dmg
      arch:
        - x64
        - arm64

dmg:
  title: PartyConsole
  writeUpdateInfo: false

# Windows
win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 奇妙奇遇控制台
