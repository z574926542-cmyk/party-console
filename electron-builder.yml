appId: com.partyConsole.app
productName: PartyConsole
copyright: Copyright © 2025

# 应用图标
icon: electron/icons/icon

directories:
  buildResources: electron/icons
  output: release

# 打包文件范围
files:
  - dist/public/**
  - electron/main.js
  - electron/package.json
  - electron/icons/**
  - "!node_modules/**"
  - "!client/**"
  - "!server/**"
  - "!shared/**"
  - "!.manus-logs/**"
  - "!patches/**"

# 额外资源
extraMetadata:
  main: electron/main.js

# macOS 配置
mac:
  category: public.app-category.entertainment
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  darkModeSupport: true

dmg:
  title: PartyConsole

# Windows 配置
win:
  target:
    - target: nsis
      arch:
        - x64
  publisherName: PartyConsole

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PartyConsole
  installerLanguages:
    - zh_CN
  language: 2052

# Linux 配置（可选）
linux:
  target:
    - AppImage
  category: Game
